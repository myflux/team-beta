name: PR Approval Gate

on:
  pull_request_review:
    types: [submitted]

jobs:
  trigger-approval:
    # TODO: Remove 'commented' after testing - should only trigger on 'approved'
    if: github.event.review.state == 'approved' || github.event.review.state == 'commented'
    name: Trigger Approval Process
    uses: myflux/.github/.github/workflows/approval-process.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_title:  ${{ github.event.pull_request.title }}
      pr_url:    ${{ github.event.pull_request.html_url }}
      pr_author: ${{ github.event.pull_request.user.login }}
      pr_reviewer: ${{ github.event.review.user.login }}
      repo_name: ${{ github.repository }}
    secrets:
      ORG_APPROVAL_TOKEN: ${{ secrets.ORG_APPROVAL_TOKEN }}
